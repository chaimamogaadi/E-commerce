# Database
spring.datasource.url=jdbc:mysql://localhost:3306/smart_ecommerce?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD_HERE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT - generate your own at https://www.allkeysgenerator.com (512-bit hex)
jwt.secret=YOUR_512_BIT_HEX_SECRET_HERE
jwt.expiration=86400000
spring.security.filter.order=10

# CORS
cors.allowed-origins=http://localhost:4200